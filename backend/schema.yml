  /api/produto/:
    get:
      operationId: produto_list
      parameters:
      - in: query
        name: ativo
        schema:
          type: boolean
      - in: query
        name: categoria
        schema:
          type: integer
      - in: query
        name: destaque
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Qual campo usar ao ordenar os resultados.
        schema:
          type: string
      - in: query
        name: preco
        schema:
          type: number
      - in: query
        name: preco__gte
        schema:
          type: number
      - in: query
        name: preco__lte
        schema:
          type: number
      - in: query
        name: quantidade
        schema:
          type: integer
      - in: query
        name: quantidade__gte
        schema:
          type: integer
      - in: query
        name: quantidade__lte
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Um termo de busca.
        schema:
          type: string
      tags:
      - produto
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Produto'
          description: ''
    post:
      operationId: produto_create
      tags:
