openapi: 3.0.3
info:
  title: MyEcomerce - Sistema de Vendas para  Emprrendedores
  version: 1.0.0
  description: Documentação da API do sistema de catálogo/vendas
paths:
  /api/categoria/:
    get:
      operationId: categoria_list
      tags:
      - categoria
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
          description: ''
    post:
      operationId: categoria_create
      tags:
