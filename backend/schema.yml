        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    Categoria:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        descricao:
          type: string
        imagem:
          type: string
          format: uri
          nullable: true
        ativo:
          type: boolean
        ordem:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - id
      - nome
      - slug
    DiasFuncionamentoEnum:
      enum:
      - S
      - SS
      type: string
      description: |-
        * `S` - segunda à sexta
        * `SS` - segunda à sábado
    ItemSolicitacao:
      type: object
      properties:
        produto:
          type: integer
        quantidade:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        variacao:
          type: string
          maxLength: 20
      required:
      - produto
    Loja:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 120
        descricao:
          type: string
        logo:
          type: string
          format: uri
          nullable: true
        banner_1:
          type: string
          format: uri
          nullable: true
        banner_2:
          type: string
          format: uri
          nullable: true
        banner_3:
          type: string
          format: uri
          nullable: true
        banner_4:
          type: string
          format: uri
          nullable: true
        telefone:
          type: string
          maxLength: 20
        whatsapp:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 254
        instagram:
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        facebook:
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        pix:
          type: string
          maxLength: 120
        cpf:
          type: string
          maxLength: 14
        cnpj:
          type: string
          maxLength: 18
        cep:
          type: string
          maxLength: 9
        rua:
          type: string
          maxLength: 200
        numero:
          type: string
          maxLength: 20
        referencia:
          type: string
          maxLength: 200
        bairro:
          type: string
          maxLength: 200
        cidade:
          type: string
          maxLength: 100
        estado:
          type: string
          maxLength: 50
        cor_primaria:
          type: string
          maxLength: 7
        cor_secundaria:
          type: string
          maxLength: 7
        mensagem_whatsapp:
          type: string
        horario_funcionamento:
          type: string
          format: time
        horario_fechamento:
          type: string
          format: time
        dias_funcionamento:
          $ref: '#/components/schemas/DiasFuncionamentoEnum'
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time
          readOnly: true
        atualizado_em:
          type: string
          format: date-time
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - atualizado_em
      - bairro
      - cep
      - cidade
      - cor_primaria
      - cor_secundaria
      - cpf
      - criado_em
      - email
      - estado
      - horario_fechamento
      - horario_funcionamento
      - id
      - nome
      - numero
      - rua
      - slug
      - telefone
      - whatsapp
    PatchedCategoria:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        descricao:
          type: string
        imagem:
          type: string
          format: uri
          nullable: true
        ativo:
          type: boolean
        ordem:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
    PatchedItemSolicitacao:
      type: object
      properties:
        produto:
          type: integer
